announcements:
  - The 2026-2027 program is being prepared.
  - Titles and abstracts will be added as talks are confirmed.

submission:
  title: Proposals are open
  text: Submit a tentative title, a short abstract, and your preferred Wednesday availability.

schedule:
  - year: 2026-2027
    sessions: []

format:
  - title: Ongoing work
    text: Present research in progress, preliminary results, open questions, or technical difficulties.
  - title: Feedback
    text: Get constructive comments from other PhD students and researchers in a friendly setting.
  - title: Collaboration
    text: Share ideas early and make it easier to start discussions across statistics PhD students.

practical:
  - label: Usual day
    value: Wednesdays, depending on speaker availability and room constraints.
  - label: Language
    value: English or French, depending on the speaker and audience.
  - label: Slides
    value: Optional. Blackboard talks are welcome.
  - label: Abstracts
    value: A short abstract is enough for the announcement.
  - label: Visitors
    value: Visitors are welcome when the speaker is comfortable with it.
