meta:
  title: CREST Statistics PhD Seminar
  subtitle: A regular seminar for PhD students in statistics to present ongoing work, exchange feedback, and foster collaborations.
  academic_year: 2026-2027
  status: Program in preparation
  location: CREST, ENSAE Paris
  day: Wednesdays
  format: 45 min talk + 15 min discussion
  audience: PhD students, postdocs, and researchers in statistics and related fields
  contact_name: Yassine Boukhateb
  contact_email: yassine.boukhateb@ensae.fr

